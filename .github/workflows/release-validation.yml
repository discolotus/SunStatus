name: Release Validation

on:
  pull_request:
  merge_group:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  release-dry-run:
    name: Release Dry Run
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Detect release version
        id: version
        run: |
          set -euo pipefail

          version="$(scripts/resolve-release-version.sh)"

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Detected release version: $version"

      - name: Build and verify release artifacts
        run: scripts/build-release.sh "${{ steps.version.outputs.version }}"

      - name: Dry-run Homebrew cask update
        run: |
          set -euo pipefail

          dmg_sha="$(shasum -a 256 .build/release/SunStatus.dmg | awk '{ print $1 }')"
          scripts/update-homebrew-cask.sh "${{ steps.version.outputs.version }}" "$dmg_sha"
          git diff --check -- Casks/sunstatus.rb
          git diff -- Casks/sunstatus.rb
