name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 0.4.0"
        required: true
        type: string
      target_ref:
        description: "Commit, branch, or tag to release"
        required: false
        default: "main"
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Publish Versioned Release
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.target_ref || github.ref }}

      - name: Detect release version
        id: version
        env:
          DISPATCH_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          parse_version() {
            sed -nE 's/^VERSION="\$\{1:-([0-9]+\.[0-9]+\.[0-9]+)\}"$/\1/p' "$1" | head -1
          }

          script_version="$(parse_version scripts/build-release.sh)"
          if [[ -z "$script_version" ]]; then
            echo "Could not parse release version from scripts/build-release.sh" >&2
            exit 1
          fi

          if [[ "$GITHUB_EVENT_NAME" == "push" ]]; then
            release_version="${GITHUB_REF_NAME#v}"
          else
            release_version="$DISPATCH_VERSION"
          fi

          if [[ ! "$release_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release version must look like 1.2.3, got: $release_version" >&2
            exit 1
          fi

          if [[ "$release_version" != "$script_version" ]]; then
            echo "Requested release version $release_version does not match scripts/build-release.sh default $script_version" >&2
            exit 1
          fi

          echo "version=$release_version" >> "$GITHUB_OUTPUT"
          echo "tag=v$release_version" >> "$GITHUB_OUTPUT"
          echo "Releasing v$release_version from $(git rev-parse --short HEAD)"

      - name: Run tests
        run: swift test

      - name: Build release artifacts
        run: scripts/build-release.sh "${{ steps.version.outputs.version }}"

      - name: Write release checksums
        run: |
          set -euo pipefail

          shasum -a 256 \
            .build/release/SunStatus.zip \
            .build/release/SunStatus.dmg \
            > .build/release/SHA256SUMS

      - name: Prepare Homebrew cask patch
        run: |
          set -euo pipefail

          dmg_sha="$(shasum -a 256 .build/release/SunStatus.dmg | awk '{ print $1 }')"
          scripts/update-homebrew-cask.sh "${{ steps.version.outputs.version }}" "$dmg_sha"

          if git diff --quiet -- Casks/sunstatus.rb; then
            echo "Homebrew cask already matches this release artifact."
            touch .build/release/homebrew-cask.patch
          else
            git diff -- Casks/sunstatus.rb > .build/release/homebrew-cask.patch
            git checkout -- Casks/sunstatus.rb
          fi

      - name: Prepare release notes
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          awk -v version="$VERSION" '
            $0 ~ "^## \\[" version "\\]([[:space:]]|$)" { in_section=1; next }
            in_section && /^## \[/ { exit }
            in_section { print }
          ' CHANGELOG.md > /tmp/release-notes.md

          if [[ ! -s /tmp/release-notes.md ]]; then
            echo "See CHANGELOG.md for release notes." > /tmp/release-notes.md
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists." >&2
            exit 1
          fi

          gh release create "$TAG" \
            .build/release/SunStatus.zip \
            .build/release/SunStatus.dmg \
            .build/release/SHA256SUMS \
            .build/release/homebrew-cask.patch \
            --target "$(git rev-parse HEAD)" \
            --title "SunStatus $TAG" \
            --notes-file /tmp/release-notes.md
