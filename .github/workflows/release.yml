name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    name: Publish Versioned Release
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect release version bump
        id: version
        env:
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail

          parse_version() {
            sed -nE 's/^VERSION="\$\{1:-([0-9]+\.[0-9]+\.[0-9]+)\}"$/\1/p' "$1" | head -1
          }

          current_version="$(parse_version scripts/build-release.sh)"
          if [[ -z "$current_version" ]]; then
            echo "Could not parse current release version from scripts/build-release.sh"
            exit 1
          fi

          previous_version=""
          if [[ -n "$BEFORE_SHA" && ! "$BEFORE_SHA" =~ ^0+$ ]] && git cat-file -e "$BEFORE_SHA:scripts/build-release.sh" 2>/dev/null; then
            git show "$BEFORE_SHA:scripts/build-release.sh" > /tmp/previous-build-release.sh
            previous_version="$(parse_version /tmp/previous-build-release.sh)"
          fi

          if [[ "$previous_version" == "$current_version" ]]; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "Release version unchanged ($current_version); skipping release."
            exit 0
          fi

          echo "publish=true" >> "$GITHUB_OUTPUT"
          echo "version=$current_version" >> "$GITHUB_OUTPUT"
          echo "tag=v$current_version" >> "$GITHUB_OUTPUT"
          echo "Detected release version bump: ${previous_version:-none} -> $current_version"

      - name: Run tests
        if: steps.version.outputs.publish == 'true'
        run: swift test

      - name: Build release archive
        if: steps.version.outputs.publish == 'true'
        run: scripts/build-release.sh "${{ steps.version.outputs.version }}"

      - name: Prepare release notes
        if: steps.version.outputs.publish == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          awk -v version="$VERSION" '
            $0 == "## [" version "]" { in_section=1; next }
            in_section && /^## \[/ { exit }
            in_section { print }
          ' CHANGELOG.md > /tmp/release-notes.md

          if [[ ! -s /tmp/release-notes.md ]]; then
            echo "See CHANGELOG.md for release notes." > /tmp/release-notes.md
          fi

      - name: Create GitHub release
        if: steps.version.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists."
            exit 1
          fi

          gh release create "$TAG" \
            .build/release/SunStatus.zip \
            --title "SunStatus $TAG" \
            --notes-file /tmp/release-notes.md
