name: CI

on:
  pull_request:
  merge_group:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Swift Tests
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Show Swift version
        run: swift --version

      - name: Run tests
        run: swift test

  changelog:
    name: Version Changelog Guard
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Require changelog entry when release version changes
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha }}
        run: |
          set -euo pipefail

          release_version_for_ref() {
            local ref="$1"

            if git cat-file -e "$ref:project.yml" 2>/dev/null; then
              git show "$ref:project.yml" \
                | sed -nE 's/^[[:space:]]*MARKETING_VERSION:[[:space:]]*"?([0-9]+\.[0-9]+\.[0-9]+)"?[[:space:]]*$/\1/p' \
                | sort -u \
                | head -1
              return
            fi

            git show "$ref:scripts/build-release.sh" \
              | sed -nE 's/^VERSION="\$\{1:-([0-9]+\.[0-9]+\.[0-9]+)\}"$/\1/p' \
              | head -1
          }

          base_version="$(release_version_for_ref "$BASE_SHA")"
          current_version="$(scripts/resolve-release-version.sh)"

          if [[ -z "$base_version" || -z "$current_version" ]]; then
            echo "Could not parse release version."
            exit 1
          fi

          if [[ "$base_version" == "$current_version" ]]; then
            echo "Release version unchanged ($current_version); no changelog entry required."
            exit 0
          fi

          if ! git diff --name-only "$BASE_SHA"...HEAD | grep -qx 'CHANGELOG.md'; then
            echo "Release version changed from $base_version to $current_version, but CHANGELOG.md was not updated."
            exit 1
          fi

          if ! grep -Eq "^## \[$current_version\]" CHANGELOG.md; then
            echo "CHANGELOG.md must include a '## [$current_version]' section."
            exit 1
          fi

          echo "Release version changed from $base_version to $current_version and CHANGELOG.md includes ## [$current_version]."
