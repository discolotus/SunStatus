name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Swift Tests
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Run tests
        run: swift test

  changelog:
    name: Version Changelog Guard
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require changelog entry when release version changes
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail

          parse_version() {
            sed -nE 's/^VERSION="\$\{1:-([0-9]+\.[0-9]+\.[0-9]+)\}"$/\1/p' "$1" | head -1
          }

          git show "$BASE_SHA:scripts/build-release.sh" > /tmp/base-build-release.sh
          base_version="$(parse_version /tmp/base-build-release.sh)"
          current_version="$(parse_version scripts/build-release.sh)"

          if [[ -z "$base_version" || -z "$current_version" ]]; then
            echo "Could not parse release version from scripts/build-release.sh"
            exit 1
          fi

          if [[ "$base_version" == "$current_version" ]]; then
            echo "Release version unchanged ($current_version); no changelog entry required."
            exit 0
          fi

          if ! git diff --name-only "$BASE_SHA"...HEAD | grep -qx 'CHANGELOG.md'; then
            echo "Release version changed from $base_version to $current_version, but CHANGELOG.md was not updated."
            exit 1
          fi

          if ! grep -Eq "^## \[$current_version\]" CHANGELOG.md; then
            echo "CHANGELOG.md must include a '## [$current_version]' section."
            exit 1
          fi

          echo "Release version changed from $base_version to $current_version and CHANGELOG.md includes ## [$current_version]."
